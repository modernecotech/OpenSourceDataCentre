steps:
  test:
    image: node:22-bookworm
    commands:
      - test -f index.html || echo "template placeholder"
  build-image:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: harbor.osdc.local/apps/static-site
      tags:
        - ${CI_COMMIT_SHA}
      registry: harbor.osdc.local
      username:
        from_secret: harbor_robot_user
      password:
        from_secret: harbor_robot_token
when:
  branch:
    - main
